server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The docs used to live under /docs/*. They're now at the root — 301 old URLs
  # so existing links, bookmarks, and search results don't break.
  location = /docs { return 301 /; }
  location = /docs/ { return 301 /; }
  location /docs/ { rewrite ^/docs/(.*)$ /$1 permanent; }

  # VitePress is built with cleanUrls — serve /foo from /foo.html.
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;
}
