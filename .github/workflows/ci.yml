name: CI

on:
  # Run on every PR regardless of base branch — supports stacked PRs where
  # the immediate base is another feature branch rather than main.
  pull_request:
  # Push trigger stays narrow — only sanity-check after a merge to main.
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when new commits land,
# so a rapid push sequence doesn't queue up many duplicate runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-typecheck:
    name: Build (tsc strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  test:
    name: Tests + smoke (no API key)
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run all node:test files
        run: node --test test/*.test.mjs
      - name: CI smoke (engine boot + memory_loaded log)
        run: node test/ci-smoke.mjs

  # Live provider integration is intentionally not part of required CI: it
  # depends on repo-scoped API-key secrets that can expire or be unavailable in
  # forks. Keep CI deterministic and no-secret; run `npm run test:ci-integration`
  # manually when validating a live model credential.
