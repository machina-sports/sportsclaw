version: 1

filesystem_policy:
  read_only:
    - /opt/venv
    - /app/dist
    - /app/node_modules
    - /app/skills-lock.json
  read_write:
    - /sandbox
    - /tmp
    - /app/.sportsclaw

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  tail_server:
    name: tail-server
    endpoints:
      - host: host.docker.internal
        port: 8090
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node

  mcp_server:
    name: mcp-server
    endpoints:
      - host: machina-drops-machina-sports-tv.org.machina.gg
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: machina-drops-world-cup-2.org.machina.gg
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node

  kalshi:
    name: kalshi
    endpoints:
      - host: api.elections.kalshi.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /opt/venv/bin/python3
      - path: /usr/bin/python3.11

  polymarket:
    name: polymarket
    endpoints:
      - host: clob.polymarket.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: gamma-api.polymarket.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /opt/venv/bin/python3
      - path: /usr/bin/python3.11

  espn:
    name: espn
    endpoints:
      - host: site.api.espn.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: site.web.api.espn.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: sports.core.api.espn.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: www.espn.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /opt/venv/bin/python3
      - path: /usr/bin/python3.11

  overlay_feed:
    name: overlay-feed
    endpoints:
      - host: 172.17.0.1
        port: 8090
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node

  # In-box Machina pod (client-api) on the host bridge: pod MCP tools
  # (retrieve / search_documents / ...) called by operator sinks when
  # composing tick context. In the full-in-box profile this REPLACES the
  # cloud drop entries under mcp_server above — the agent's memory and
  # retrieval never leave the box. Reach the host like tail-server does:
  # 172.17.0.1 through the engine's egress proxy (host.docker.internal
  # kept for docker-desktop parity).
  retrieval:
    name: retrieval
    endpoints:
      # client-api REST (retrieval + writeback)
      - host: 172.17.0.1
        port: 5003
        protocol: rest
        enforcement: enforce
        access: full
      - host: host.docker.internal
        port: 5003
        protocol: rest
        enforcement: enforce
        access: full
      # local pod MCP server (document/memory tools)
      - host: 172.17.0.1
        port: 8000
        protocol: rest
        enforcement: enforce
        access: full
      - host: host.docker.internal
        port: 8000
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node
